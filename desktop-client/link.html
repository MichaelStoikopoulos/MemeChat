<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Link this device</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1e1f22;
        color: #f2f3f5;
        padding: 24px;
      }
      h1 { font-size: 18px; margin-top: 0; }
      label { display: block; font-size: 13px; margin: 12px 0 4px; color: #b5bac1; }
      input {
        width: 100%;
        background: #2b2d31;
        color: #f2f3f5;
        border: 1px solid #4e5058;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 14px;
      }
      button {
        margin-top: 18px;
        width: 100%;
        background: #5865f2;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 10px;
        font-size: 14px;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      #error { color: #f23f42; font-size: 13px; margin-top: 10px; min-height: 16px; }
    </style>
  </head>
  <body>
    <h1>Link this device</h1>
    <form id="link-form">
      <label for="serverUrl">Server URL</label>
      <input id="serverUrl" type="text" placeholder="http://your-server:3000" required />

      <label for="code">Pairing code</label>
      <input id="code" type="text" placeholder="ABCD1234" required autocomplete="off" />

      <button id="submit" type="submit">Link device</button>
      <div id="error"></div>
    </form>
    <script src="link-renderer.js"></script>
  </body>
</html>
