<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Meme Relay Overlay</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      #drop {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.25s ease;
        pointer-events: none;
      }
      #drop.visible { opacity: 1; }
      .card {
        background: rgba(20, 20, 24, 0.85);
        border-radius: 16px;
        padding: 20px;
        max-width: 60vw;
        max-height: 70vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      }
      .card img {
        max-width: 100%;
        max-height: 50vh;
        border-radius: 8px;
        display: block;
      }
      .card .text {
        color: #f2f3f5;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 20px;
        text-align: center;
        max-width: 100%;
        word-wrap: break-word;
      }
      .card .author {
        color: #b5bac1;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="drop">
      <div class="card">
        <img id="image" src="" alt="" />
        <div id="text" class="text"></div>
        <div id="author" class="author"></div>
      </div>
    </div>
    <script src="overlay-renderer.js"></script>
  </body>
</html>
